# Ray Tune Sweep — Shield V4 Hyperparameter Optimization
# =========================================================
# Shield = institutional-grade moderate risk. Optimizes risk_adjusted_return
# (return / max_drawdown) — NOT raw return. This prevents selecting runs
# that got lucky on a big trade but suffered 15% drawdowns.
#
# Usage:
#   python -m training.tune_sweep --profile shield --config training/configs/tune_shield.yaml

sweep:
  method: asha
  num_samples: 20
  grace_period: 500000    # Don't kill late-bloomers — PPO agents need time to map VF
  max_timesteps: 2000000

  metric: env_runners/risk_adjusted_return
  mode: max

  parameters:
    _peak_lr:
      distribution: log_uniform
      min: 5e-5
      max: 3e-4
    _start_entropy:
      distribution: log_uniform
      min: 0.002
      max: 0.008
    gamma:
      distribution: uniform
      min: 0.995
      max: 0.999
    clip_param:
      distribution: uniform
      min: 0.08
      max: 0.18
    minibatch_size:
      values: [256, 512]
    num_epochs:
      values: [4, 6]
    train_batch_size_per_learner:
      values: [16384]

  fixed:
    lambda_: 0.95
    vf_loss_coeff: 0.5
    grad_clip: 0.5
    model:
      fcnet_hiddens: [256, 256, 128]
      fcnet_activation: tanh

wandb:
  project: moleapp-rl
  group: shield-sweep-v4
