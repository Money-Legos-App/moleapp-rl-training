# Ray Tune Sweep — Shield Agent PPO Hyperparameter Optimization
# ==============================================================
# Usage:
#   python -m training.tune_sweep --config training/configs/tune_shield.yaml
#
# This config is informational — the actual search spaces are defined
# in training/tune_sweep.py using Ray Tune's API (tune.loguniform, etc.)

sweep:
  method: asha           # ASHAScheduler (replaces W&B Hyperband)
  num_samples: 30        # Total trials (replaces run_cap)
  grace_period: 500000   # Min timesteps before killing a trial
  max_timesteps: 2000000 # Per-trial budget

  metric: env_runners/episode_reward_mean
  mode: max

  # Swept parameters (defined as tune search spaces in code)
  parameters:
    lr:
      distribution: log_uniform
      min: 1e-5
      max: 1e-3
    entropy_coeff:
      distribution: log_uniform
      min: 0.001
      max: 0.05
    minibatch_size:
      values: [256, 512, 1024, 2048]
    gamma:
      distribution: uniform
      min: 0.98
      max: 0.999

  # Fixed PPO params
  fixed:
    lambda_: 0.95
    clip_param: 0.2
    num_epochs: 10
    train_batch_size_per_learner: 2048
    vf_loss_coeff: 0.5
    grad_clip: 0.5

# W&B integration
wandb:
  project: moleapp-rl
  group: shield-sweep-rllib
