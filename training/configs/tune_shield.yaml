# Ray Tune Sweep — Shield V3 Hyperparameter Optimization
# ========================================================
# Usage:
#   python -m training.tune_sweep --config training/configs/tune_shield.yaml
#
# Sweeps V3-relevant params while maintaining schedule structure.
# ASHA kills bad trials early — ~60% of trials stopped before 1M steps.

sweep:
  method: asha
  num_samples: 20
  grace_period: 400000    # Min steps before killing a trial
  max_timesteps: 2000000  # Per-trial budget

  metric: env_runners/episode_return_mean
  mode: max

  # Swept parameters (actual search spaces defined in tune_sweep.py)
  parameters:
    _peak_lr:
      distribution: log_uniform
      min: 5e-5
      max: 1e-3
    _start_entropy:
      distribution: log_uniform
      min: 0.002
      max: 0.02
    gamma:
      distribution: uniform
      min: 0.99
      max: 0.999
    clip_param:
      distribution: uniform
      min: 0.1
      max: 0.25
    minibatch_size:
      values: [128, 256, 512]
    num_epochs:
      values: [4, 6, 8]
    train_batch_size_per_learner:
      values: [8192, 16384]

  # Fixed PPO params (not swept)
  fixed:
    lambda_: 0.95
    vf_loss_coeff: 0.5
    grad_clip: 0.5
    model:
      fcnet_hiddens: [256, 256, 128]
      fcnet_activation: tanh

# W&B integration
wandb:
  project: moleapp-rl
  group: shield-sweep-v3
