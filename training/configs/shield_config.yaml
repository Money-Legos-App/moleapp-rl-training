# Shield (CONSERVATIVE) PPO Training Configuration — RLlib
# Target: Sharpe > 1.0, Max Drawdown < 10%, Win Rate > 60%

algorithm: PPO
env: ShieldTradingEnv

# Training loop
total_timesteps: 10_000_000     # ~14h on RTX 4090 (8 runners), ~8h on A100

# PPO Hyperparameters
lr: 0.0003
gamma: 0.995                     # Higher discount — Shield plans over longer horizons
lambda_: 0.95                    # GAE for advantage estimation
clip_param: 0.2                  # PPO clipping parameter
num_epochs: 6                    # Fewer passes — larger batch compensates
minibatch_size: 256              # Larger batches → better GPU utilization
train_batch_size_per_learner: 16384 # Larger batch — 128 envs fill this fast
entropy_coeff_schedule:          # Anneal exploration: high early, low late
  - [0, 0.01]
  - [10_000_000, 0.001]
vf_loss_coeff: 0.5               # Value function coefficient
grad_clip: 0.5                   # Gradient clipping

# Policy Network
model:
  fcnet_hiddens: [256, 256, 128]   # 3-layer MLP
  fcnet_activation: tanh

# Parallelism — scale to saturate GPU with trajectory data
num_env_runners: 32
num_envs_per_env_runner: 4
# Observation normalization: handled by gym.wrappers.NormalizeObservation in env registration

# Environment Parameters
env_config:
  max_leverage: 1
  max_positions: 2
  initial_capital: 1000.0
  max_sl_pct: 0.03
  min_sl_pct: 0.005
  max_tp_pct: 0.075
  min_tp_pct: 0.01
  episode_length: 2880           # 120 days of 1h candles (~4 months)
  max_drawdown_pct: 0.10         # 10% kill switch — terminates episode

# Evaluation
evaluation:
  evaluation_interval: 50        # Every 50 training iterations (less frequent, less overhead)
  evaluation_duration: 5         # 5 eval episodes (unit=episodes set in train.py)
  evaluation_parallel_to_training: true  # Eval runs in background, doesn't block training
  num_env_runners: 1

# Checkpointing (iterations, not timesteps)
checkpoint_freq: 50

# GPU — auto-detected at runtime by train.py
# Set to 0 for CPU-only, or leave as-is for auto-detect
num_gpus: 1
num_learners: 1
num_gpus_per_learner: 1

# W&B Logging
wandb:
  project: moleapp-rl
  run_name: shield-v2-rllib
  tags: ["shield", "conservative", "ppo", "rllib"]
