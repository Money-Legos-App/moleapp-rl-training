# Shield (CONSERVATIVE) PPO Training Configuration — RLlib
# Target: Sharpe > 1.0, Max Drawdown < 10%, Win Rate > 60%

algorithm: PPO
env: ShieldTradingEnv

# Training loop
total_timesteps: 10_000_000     # ~40h on A100, ~120h on T4

# PPO Hyperparameters
lr: 0.0003
gamma: 0.99                      # High discount — Shield cares about long-term stability
lambda_: 0.95                    # GAE for advantage estimation
clip_param: 0.2                  # PPO clipping parameter
num_epochs: 10                   # Passes over collected batch
minibatch_size: 64               # Mini-batch size for each gradient step
train_batch_size_per_learner: 2048  # Steps before each PPO update
entropy_coeff: 0.01              # Entropy bonus for exploration
vf_loss_coeff: 0.5               # Value function coefficient
grad_clip: 0.5                   # Gradient clipping

# Policy Network
model:
  fcnet_hiddens: [256, 256, 128]   # 3-layer MLP
  fcnet_activation: tanh

# Parallelism
num_env_runners: 4
num_envs_per_env_runner: 1

# Observation normalization (replaces VecNormalize)
observation_filter: MeanStdFilter

# Environment Parameters
env_config:
  max_leverage: 1
  max_positions: 2
  initial_capital: 1000.0
  max_sl_pct: 0.03
  min_sl_pct: 0.005
  max_tp_pct: 0.06
  min_tp_pct: 0.01
  episode_length: 2880           # 30 days of 15-min steps
  max_drawdown_pct: 0.10         # 10% kill switch — terminates episode

# Evaluation
evaluation:
  evaluation_interval: 25        # Every 25 training iterations
  evaluation_duration: 20        # Number of eval episodes
  num_env_runners: 1

# Checkpointing (iterations, not timesteps)
checkpoint_freq: 10

# GPU (set > 0 for RunPod)
num_gpus: 0
num_learners: 1
num_gpus_per_learner: 1

# W&B Logging
wandb:
  project: moleapp-rl
  run_name: shield-v2-rllib
  tags: ["shield", "conservative", "ppo", "rllib"]
