# Shield (CONSERVATIVE) PPO Training Configuration — V10 (Production Polish)
# Target: Sharpe > 1.0, Max Drawdown < 10%, Win Rate > 50%
#
# V9 breakthrough: eval_pnl climbed to +123.31, win_rate stable at 46%,
# episode_reward +3,026. The Sniper's Carrot reward works.
#
# V10 polish for production deployment:
# 1. Pipeline hardening: np.nan_to_num in callbacks, zero-trade guards
# 2. Inference exporter fix: norm stats computed from training data cache
# 3. Horizon extension: 20M steps (V9 was still improving at 10M)
# 4. W&B NaN filter + define_metric summaries for clean dashboards
#
# After V10, both Shield and Builder weights exported for live trading.

algorithm: PPO
env: ShieldTradingEnv

total_timesteps: 20_000_000     # ~100min on RTX 4090 (V9 still improving at 10M)

# PPO Hyperparameters (V9 proven winners)
lr_schedule:
  - [0, 0.00005]                   # Start at sweep-optimal peak (5e-5)
  - [20000000, 0.000005]           # Linear decay to 5e-6 floor by 20M
gamma: 0.9967
lambda_: 0.95
clip_param: 0.156
num_epochs: 6
minibatch_size: 256
train_batch_size_per_learner: 16384
entropy_coeff_schedule:          # Anneal scaled to 20M horizon
  - [0, 0.01]                    # High early: map V9 reward landscape
  - [7000000, 0.005]             # ~35%: start narrowing
  - [14000000, 0.002]            # ~70%: consolidate alpha
  - [20000000, 0.001]            # End: exploit, never fully deterministic
vf_loss_coeff: 0.5
grad_clip: 0.5

model:
  fcnet_hiddens: [256, 256, 128]
  fcnet_activation: tanh

num_env_runners: 10
num_envs_per_env_runner: 4

env_config:
  max_leverage: 1
  max_positions: 2
  initial_capital: 1000.0
  max_sl_pct: 0.03
  min_sl_pct: 0.005
  max_tp_pct: 0.075
  min_tp_pct: 0.01
  episode_length: 2880
  max_drawdown_pct: 0.10

evaluation:
  evaluation_interval: 50
  evaluation_duration: 5
  evaluation_parallel_to_training: true
  num_env_runners: 1

checkpoint_freq: 50

num_gpus: 1
num_learners: 1
num_gpus_per_learner: 1

wandb:
  project: moleapp-rl
  run_name: shield-v10-production
  tags: ["shield", "conservative", "ppo", "rllib", "v10-production", "20M"]
