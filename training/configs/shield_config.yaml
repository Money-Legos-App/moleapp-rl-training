# Shield (CONSERVATIVE) PPO Training Configuration — V6 (Reward + Entropy Fix)
# Target: Sharpe > 1.0, Max Drawdown < 10%, Win Rate > 60%
#
# V5 achieved 27% peak return but two structural issues remained:
# 1. Entropy collapsed (7.5 → negative) despite flat 0.005 — too weak for
#    tight 0.156 clip. Raised to 0.015 (3x stronger).
# 2. Reward hit -50K while trading profitably — state-based drawdown penalty
#    accumulated -35/step × 2880 steps. Fixed: delta-based drawdown penalty
#    + per-step reward floor at -5.0.
#
# V4 sweep source (trial c3048_00002):
#   risk_adjusted_return: 5.13, drawdown: 5.8%, return: +6.6%

algorithm: PPO
env: ShieldTradingEnv

# Training loop
total_timesteps: 10_000_000     # ~50min on RTX 4090 (10 runners)

# PPO Hyperparameters (V4 sweep winners + V5 schedule fix)
lr_schedule:                       # Gentle linear decay — NO mid-training spike
  - [0, 0.00005]                   # Start at sweep-optimal peak (5e-5)
  - [10000000, 0.000001]           # Linear decay to 1e-6 by end — slow cooldown
gamma: 0.9967                    # Sweep winner: patient risk management
lambda_: 0.95                    # GAE for advantage estimation
clip_param: 0.156                # Sweep winner: moderate clip
num_epochs: 6                    # Sweep winner: 6 passes per batch
minibatch_size: 256              # Sweep winner: smooth gradients
train_batch_size_per_learner: 16384 # Large batch — stable updates
entropy_coeff: 0.015             # V6: 3x stronger than V5's 0.005. At 0.005,
                                 # entropy still collapsed (7.5 → negative) because
                                 # tight 0.156 clip drives policy toward determinism
                                 # faster than 0.005 bonus can resist.
vf_loss_coeff: 0.5               # Value function coefficient
grad_clip: 0.5                   # Gradient clipping

# Policy Network
model:
  fcnet_hiddens: [256, 256, 128]   # 3-layer MLP
  fcnet_activation: tanh

# Parallelism — 10 runners + 1 learner + 1 driver = 12 of 13 CPUs
num_env_runners: 10
num_envs_per_env_runner: 4
# Observation normalization: handled by gym.wrappers.NormalizeObservation in env registration

# Environment Parameters
env_config:
  max_leverage: 1
  max_positions: 2
  initial_capital: 1000.0
  max_sl_pct: 0.03
  min_sl_pct: 0.005
  max_tp_pct: 0.075
  min_tp_pct: 0.01
  episode_length: 2880           # 120 days of 1h candles (~4 months)
  max_drawdown_pct: 0.10         # 10% kill switch — terminates episode

# Evaluation
evaluation:
  evaluation_interval: 50        # Every 50 training iterations
  evaluation_duration: 5         # 5 eval episodes
  evaluation_parallel_to_training: true
  num_env_runners: 1

# Checkpointing (iterations, not timesteps)
checkpoint_freq: 50

# GPU — auto-detected at runtime by train.py
num_gpus: 1
num_learners: 1
num_gpus_per_learner: 1

# W&B Logging
wandb:
  project: moleapp-rl
  run_name: shield-v6-reward-entropy-fix
  tags: ["shield", "conservative", "ppo", "rllib", "v6-delta-dd", "v6-entropy-015"]
