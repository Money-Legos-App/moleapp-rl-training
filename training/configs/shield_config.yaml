# Shield (CONSERVATIVE) PPO Training Configuration — V9 (The Sniper's Carrot)
# Target: Sharpe > 1.0, Max Drawdown < 10%, Win Rate > 60%
#
# V8 postmortem: V6 reward was all stick. Agent turtled up, took zero trades,
# win_rate decayed to 15%, eval NaN'd from 0-trade episodes. The shield
# worked (2-5% drawdown) but the agent was too scared to pull the trigger.
#
# V9 fixes:
# 1. Reward: +10 flat bonus + 5x PnL multiplier for profitable trades (the carrot)
# 2. NaN guards: zero-trade episodes explicitly set win_rate=0, pnl=0
# 3. LR floor: 5e-5 → 5e-6 (was 1e-6, brain froze before refining strategy)
# 4. Entropy: anneal 0.01 → 0.001 (V8 schedule, proven foundation)

algorithm: PPO
env: ShieldTradingEnv

total_timesteps: 10_000_000     # ~50min on RTX 4090

# PPO Hyperparameters
lr_schedule:
  - [0, 0.00005]                   # Start at sweep-optimal peak (5e-5)
  - [10000000, 0.000005]           # V9: floor at 5e-6 (was 1e-6 — too aggressive)
gamma: 0.9967
lambda_: 0.95
clip_param: 0.156
num_epochs: 6
minibatch_size: 256
train_batch_size_per_learner: 16384
entropy_coeff_schedule:          # V8 anneal: explore early, exploit late
  - [0, 0.01]
  - [4000000, 0.005]
  - [8000000, 0.002]
  - [10000000, 0.001]
vf_loss_coeff: 0.5
grad_clip: 0.5

model:
  fcnet_hiddens: [256, 256, 128]
  fcnet_activation: tanh

num_env_runners: 10
num_envs_per_env_runner: 4

env_config:
  max_leverage: 1
  max_positions: 2
  initial_capital: 1000.0
  max_sl_pct: 0.03
  min_sl_pct: 0.005
  max_tp_pct: 0.075
  min_tp_pct: 0.01
  episode_length: 2880
  max_drawdown_pct: 0.10

evaluation:
  evaluation_interval: 50
  evaluation_duration: 5
  evaluation_parallel_to_training: true
  num_env_runners: 1

checkpoint_freq: 50

num_gpus: 1
num_learners: 1
num_gpus_per_learner: 1

wandb:
  project: moleapp-rl
  run_name: shield-v9-snipers-carrot
  tags: ["shield", "conservative", "ppo", "rllib", "v9-carrot", "v6-reward-base"]
