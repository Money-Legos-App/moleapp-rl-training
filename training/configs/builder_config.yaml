# Builder (MODERATE) PPO Training Configuration — RLlib
# Target: Sharpe > 0.8, Max Drawdown < 25%, Steady Growth

algorithm: PPO
env: BuilderTradingEnv

total_timesteps: 10_000_000

lr: 0.0003
gamma: 0.995                     # Slightly higher discount — trend following
lambda_: 0.95
clip_param: 0.2
num_epochs: 10
minibatch_size: 64
train_batch_size_per_learner: 4096
entropy_coeff: 0.01
vf_loss_coeff: 0.5
grad_clip: 0.5

model:
  fcnet_hiddens: [256, 256, 128]
  fcnet_activation: tanh

num_env_runners: 8
num_envs_per_env_runner: 2
# Observation normalization: handled by gym.wrappers.NormalizeObservation in env registration

env_config:
  max_leverage: 2
  max_positions: 4
  initial_capital: 1000.0
  max_sl_pct: 0.05
  min_sl_pct: 0.01
  max_tp_pct: 0.10
  min_tp_pct: 0.02
  episode_length: 2880           # 120 days of 1h candles (~4 months)
  max_drawdown_pct: 0.20         # 20% kill switch — terminates episode

evaluation:
  evaluation_interval: 50
  evaluation_duration: 5
  num_env_runners: 1

checkpoint_freq: 50

num_gpus: auto
num_learners: 1
num_gpus_per_learner: 1

wandb:
  project: moleapp-rl
  run_name: builder-v2-rllib
  tags: ["builder", "moderate", "ppo", "rllib"]
