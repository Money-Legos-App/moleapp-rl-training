# Builder (MODERATE) PPO Training Configuration — V5 (Carrot + 20M Production)
# Target: Sharpe > 0.8, Max Drawdown < 20%, Win Rate > 45%
#
# V4 ran 10M with old reward (all-stick). V5 applies Shield V9/V10 lessons:
# 1. Carrot reward: +10 flat bonus + 3x PnL multiplier on wins
# 2. Delta-based drawdown (not state-based accumulation)
# 3. Per-step reward floor at -5.0
# 4. 20M horizon (Shield V10 peaked at 17.2M)
# 5. NaN-hardened callbacks (shared with Shield V10)
# 6. Best-model checkpointing by eval_pnl
#
# V4 sweep source (trial bd29e_00003):
#   return: -1407, drawdown: 8.5%, win_rate: 39.8%

algorithm: PPO
env: BuilderTradingEnv

total_timesteps: 20_000_000     # ~100min on RTX 4090

# PPO Hyperparameters (V4 sweep winners + V5 schedule fixes)
lr_schedule:
  - [0, 0.0000167]                 # Start at peak/30 (sweep: 5e-4 peak)
  - [200000, 0.0005]               # Ramp to peak by 200K
  - [20000000, 0.00005]            # Decay to 10% floor by 20M
gamma: 0.9963                    # Sweep winner: patient trend following
lambda_: 0.95
clip_param: 0.277                # Sweep winner: wider clip (Builder explores more)
num_epochs: 8                    # Sweep winner: 8 passes per batch
minibatch_size: 256
train_batch_size_per_learner: 16384
entropy_coeff_schedule:          # Anneal scaled to 20M
  - [0, 0.008]                   # Lower start than Shield (wider clip = less determinism pressure)
  - [7000000, 0.004]
  - [14000000, 0.002]
  - [20000000, 0.001]
vf_loss_coeff: 0.5
grad_clip: 0.5

model:
  fcnet_hiddens: [256, 256, 128]
  fcnet_activation: tanh

num_env_runners: 10
num_envs_per_env_runner: 4

env_config:
  max_leverage: 2
  max_positions: 4
  initial_capital: 1000.0
  max_sl_pct: 0.05
  min_sl_pct: 0.01
  max_tp_pct: 0.10
  min_tp_pct: 0.02
  episode_length: 2880
  max_drawdown_pct: 0.20

evaluation:
  evaluation_interval: 50
  evaluation_duration: 5
  evaluation_parallel_to_training: true
  num_env_runners: 1

checkpoint_freq: 50

num_gpus: 1
num_learners: 1
num_gpus_per_learner: 1

wandb:
  project: moleapp-rl
  run_name: builder-v5-carrot-production
  tags: ["builder", "moderate", "ppo", "rllib", "v5-carrot", "20M"]
