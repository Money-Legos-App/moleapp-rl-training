# Hunter (AGGRESSIVE) PPO Training Configuration — RLlib
# Target: Total Return > 50% on backtest, Drawdown acceptable up to 35%

algorithm: PPO
env: HunterTradingEnv

total_timesteps: 10_000_000

lr: 0.0003
gamma: 0.99
lambda_: 0.95
clip_param: 0.2
num_epochs: 10
minibatch_size: 64
train_batch_size_per_learner: 2048
entropy_coeff: 0.015             # Slightly higher entropy for more exploration
vf_loss_coeff: 0.5
grad_clip: 0.5

model:
  fcnet_hiddens: [256, 256, 128]
  fcnet_activation: tanh

num_env_runners: 4
num_envs_per_env_runner: 1
observation_filter: MeanStdFilter

env_config:
  max_leverage: 3
  max_positions: 5
  initial_capital: 1000.0
  max_sl_pct: 0.07
  min_sl_pct: 0.02
  max_tp_pct: 0.15
  min_tp_pct: 0.03
  episode_length: 2880
  max_drawdown_pct: 0.30         # 30% kill switch — terminates episode

evaluation:
  evaluation_interval: 25
  evaluation_duration: 20
  num_env_runners: 1

checkpoint_freq: 10

num_gpus: 0
num_learners: 1
num_gpus_per_learner: 1

wandb:
  project: moleapp-rl
  run_name: hunter-v2-rllib
  tags: ["hunter", "aggressive", "ppo", "rllib"]
