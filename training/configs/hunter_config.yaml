# Hunter (AGGRESSIVE) PPO Training Configuration
# Target: Total Return > 50% on backtest, Drawdown acceptable up to 35%

model: PPO
env: HunterTradingEnv

total_timesteps: 10_000_000
n_steps: 2048
batch_size: 64
n_epochs: 10
learning_rate: 0.0003
gamma: 0.99
gae_lambda: 0.95
clip_range: 0.2
ent_coef: 0.015                  # Slightly higher entropy for more exploration
vf_coef: 0.5
max_grad_norm: 0.5

policy: MlpPolicy
policy_kwargs:
  net_arch: [256, 256, 128]
  activation_fn: tanh

env_kwargs:
  max_leverage: 3
  max_positions: 5
  initial_capital: 1000.0
  max_sl_pct: 0.07
  min_sl_pct: 0.02
  max_tp_pct: 0.15
  min_tp_pct: 0.03
  episode_length: 2880

normalize_observations: true
normalize_rewards: true
norm_obs_clip: 10.0
norm_reward_clip: 10.0

eval_freq: 50000
n_eval_episodes: 20
deterministic_eval: true

checkpoint_freq: 200000
save_best_model: true

wandb_project: moleapp-rl
wandb_run_name: hunter-v1
wandb_tags: ["hunter", "aggressive", "ppo"]
